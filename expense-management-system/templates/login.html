<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ExpenseFlow | Login</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Inter',sans-serif;

            background:#0F172A;

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

        }

        .login-card{

            width:420px;

            background:#1E293B;

            padding:45px;

            border-radius:20px;

            box-shadow:0 20px 50px rgba(0,0,0,.35);

        }

        .logo{

            width:80px;

            height:80px;

            margin:auto;

            background:#22C55E;

            border-radius:50%;

            display:flex;

            justify-content:center;

            align-items:center;

            font-size:35px;

            margin-bottom:20px;

        }

        h2{

            color:white;

            text-align:center;

            margin-bottom:10px;

            font-weight:700;

        }

        .subtitle{

            color:#94A3B8;

            text-align:center;

            margin-bottom:30px;

        }

        label{

            color:#CBD5E1;

            margin-bottom:8px;

            font-weight:500;

        }

        .form-control{

            background:#0F172A;

            color:white;

            border:1px solid #334155;

            height:48px;

        }

        .form-control:focus{

            background:#0F172A;

            color:white;

            border-color:#22C55E;

            box-shadow:none;

        }

        .btn-login{

            background:#22C55E;

            border:none;

            height:48px;

            font-weight:600;

        }

        .btn-login:hover{

            background:#16A34A;

        }

        .btn-outline-secondary{

            border-color:#334155;

            color:white;

        }

        .btn-outline-secondary:hover{

            background:#334155;

            border-color:#334155;

        }

        hr{

            border-color:#334155;

            margin:30px 0;

        }

        .signup-text{

            color:#CBD5E1;

            text-align:center;

        }

        .signup-text a{

            color:#22C55E;

            text-decoration:none;

            font-weight:600;

        }

        .signup-text a:hover{

            text-decoration:underline;

        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="logo">

        💸

    </div>

    <h2>

        ExpenseFlow

    </h2>

    <p class="subtitle">

        Login to your account

    </p>

    {% with messages = get_flashed_messages() %}

        {% if messages %}

            {% for message in messages %}

                <div class="alert alert-warning">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    <form method="POST">

        <div class="mb-3">

            <label>

                Username

            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                required>

        </div>

        <div class="mb-4">

            <label>

                Password

            </label>

            <div class="input-group">

                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    required>

                <button
                    type="button"
                    class="btn btn-outline-secondary"
                    onclick="togglePassword()">

                    <i class="bi bi-eye"></i>

                </button>

            </div>

        </div>

        <button
            class="btn btn-login w-100">

            Login

        </button>

    </form>

    <hr>

    <p class="signup-text">

        Don't have an account?

        <a href="/signup">

            Create one

        </a>

    </p>

</div>

<script>

function togglePassword(){

    const password=document.getElementById("password");

    if(password.type==="password"){

        password.type="text";

    }

    else{

        password.type="password";

    }

}

</script>

</body>

</html>

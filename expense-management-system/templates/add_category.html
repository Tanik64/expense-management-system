{% extends 'base.html' %}

{% block content %}

<h2>Add Category</h2>

<form method="POST">

    <div class="mb-3">

        <label>Category Name</label>

        <input
            type="text"
            name="category_name"
            class="form-control"
            required>

    </div>

    <button class="btn btn-success">
        Save Category
    </button>

</form>

{% endblock %}

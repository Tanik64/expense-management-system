{% extends 'base.html' %}

{% set page_title = "Add Travel Expense" %}

{% block content %}

<div class="page-card">

    <div class="page-header">

        <h2>
            Add Travel Expense
        </h2>

        <p>
            Record an expense for this trip
        </p>

    </div>

    <form method="POST">

        <div class="mb-3">

            <label>Category</label>

            <select
                name="category"
                class="form-control">

                <option>Flight</option>
                <option>Hotel</option>
                <option>Taxi</option>
                <option>Fuel</option>
                <option>Food</option>
                <option>Bus</option>
                <option>Train</option>
                <option>Parking</option>
                <option>Toll</option>
                <option>Local Transport</option>

            </select>

        </div>

        <div class="mb-3">

            <label>Amount</label>

            <input
                type="number"
                step="0.01"
                name="amount"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>Date</label>

            <input
                type="date"
                name="expense_date"
                class="form-control">

        </div>

        <div class="mb-3">

            <label>Description</label>

            <textarea
                name="description"
                class="form-control">
            </textarea>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Add Expense

        </button>

    </form>

</div>

{% endblock %}

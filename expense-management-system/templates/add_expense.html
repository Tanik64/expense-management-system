{% extends 'base.html' %}

{% set page_title = "Add Expense" %}

{% block content %}

<div class="page-header">

    <h2>Add Expense</h2>

    <p>
        Record a new personal expense.
    </p>

</div>

<div class="page-card">

<form method="POST">

    <div class="form-group">

        <label>Category</label>

        <select
            name="category"
            class="form-select"
            required>

            {% for category in categories %}

            <option value="{{ category.category_name }}">
                {{ category.category_name }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="form-group">

        <label>Amount (₹)</label>

        <input
            type="number"
            step="0.01"
            name="amount"
            class="form-control"
            placeholder="Enter amount"
            required>

    </div>

    <div class="form-group">

        <label>Date</label>

        <input
            type="date"
            name="expense_date"
            class="form-control"
            value="{{ today }}"
            required>

    </div>

    <div class="form-group">

        <label>Description</label>

        <textarea
            name="description"
            class="form-control"
            rows="4"
            placeholder="Optional description"></textarea>

    </div>

    <div style="display:flex;gap:15px;margin-top:25px;">

        <button
            type="submit"
            class="btn btn-primary">

            <i class="bi bi-check-circle"></i>

            Save Expense

        </button>

        <a
            href="/expenses"
            class="btn btn-secondary">

            <i class="bi bi-arrow-left"></i>

            Cancel

        </a>

    </div>

</form>

</div>

{% endblock %}

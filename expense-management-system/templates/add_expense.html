{% extends 'base.html' %}

{% set page_title = "Add Expense" %}

{% block content %}

<div class="page-header">

    <h2>Add Expense</h2>

    <p>
        Record a new personal expense.
    </p>

</div>

<div class="page-card" style="margin-bottom:25px;">

    <h4>
        <i class="bi bi-camera-fill"></i>
        Scan a Receipt
    </h4>

    <p style="color:var(--muted);margin-bottom:16px;">
        Upload or take a photo of a receipt and we'll try to fill in
        the amount, date, and category for you below.
    </p>

    <form
        method="POST"
        action="/expense/scan-receipt"
        enctype="multipart/form-data"
        style="display:flex;gap:15px;flex-wrap:wrap;align-items:center;">

        <input
            type="file"
            name="receipt"
            accept="image/*"
            capture="environment"
            class="form-control"
            style="max-width:320px;"
            required>

        <button
            type="submit"
            class="btn btn-secondary">

            <i class="bi bi-magic"></i>

            Scan Receipt

        </button>

    </form>

</div>

<div class="page-card">

<form method="POST">

    <div class="form-group">

        <label>Category</label>

        <select
            name="category"
            class="form-select"
            required>

            {% for category in categories %}

            <option
                value="{{ category.category_name }}"
                {% if scanned_category is defined and scanned_category == category.category_name %}
                selected
                {% endif %}>
                {{ category.category_name }}
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="form-group">

        <label>Amount (₹)</label>

        <input
            type="number"
            step="0.01"
            name="amount"
            class="form-control"
            placeholder="Enter amount"
            value="{% if scanned_amount is defined and scanned_amount is not none %}{{ scanned_amount }}{% endif %}"
            required>

    </div>

    <div class="form-group">

        <label>Date</label>

        <input
            type="date"
            name="expense_date"
            class="form-control"
            value="{% if scanned_date is defined and scanned_date %}{{ scanned_date }}{% else %}{{ today }}{% endif %}"
            required>

    </div>

    <div class="form-group">

        <label>Description</label>

        <textarea
            name="description"
            class="form-control"
            rows="4"
            placeholder="Optional description">{% if scanned_description is defined %}{{ scanned_description }}{% endif %}</textarea>

    </div>

    <div style="display:flex;gap:15px;margin-top:25px;">

        <button
            type="submit"
            class="btn btn-primary">

            <i class="bi bi-check-circle"></i>

            Save Expense

        </button>

        <a
            href="/expenses"
            class="btn btn-secondary">

            <i class="bi bi-arrow-left"></i>

            Cancel

        </a>

    </div>

</form>

</div>

{% endblock %}

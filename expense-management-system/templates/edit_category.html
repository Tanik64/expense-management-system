{% extends 'base.html' %}

{% set page_title = "Edit Category" %}

{% block content %}

<div class="page-card">

    <h2>Edit Category</h2>

    <form method="POST">

        <div class="mb-3">

            <label>Category Name</label>

            <input
                type="text"
                name="category_name"
                class="form-control"
                value="{{ category.category_name }}"
                required>

        </div>

        <button class="btn btn-primary">

            Update Category

        </button>

    </form>

</div>

{% endblock %}
